name: smoke test

# Runs the regression guard on every push and pull request, across all three
# OSes. This is what catches launcher/syntax/version/render regressions before
# they reach a user. It cannot click a native dialog or exercise a GPU encoder
# (no display, no hardware on runners) — those stay on the pre-release human
# checklist — but it confirms the code builds, renders, stays non-magenta, the
# panel serves, the packages assemble, and the launchers lint clean.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Show versions
        run: |
          python --version
          ffmpeg -version
          python filmify.py --version

      - name: Run smoke + launcher tests
        timeout-minutes: 10
        run: pytest -q -s test_filmify.py test_launchers.py test_photochemical.py

      - name: Install Playwright (Linux only — UI interaction test)
        if: runner.os == 'Linux'
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run panel UI test
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: pytest -q -s test_panel_ui.py

  lint:
    name: shell lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck + bash -n on launchers
        run: |
          shellcheck --version
          for f in *.command *.sh; do
            echo "== $f =="
            bash -n "$f"
            shellcheck "$f"
          done
